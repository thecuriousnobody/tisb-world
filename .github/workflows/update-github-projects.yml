name: Update GitHub Projects with AI Descriptions

on:
  # Run weekly on Mondays at 8 AM UTC
  schedule:
    - cron: '0 8 * * 1'
  # Also run when repos change (push to main)
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/**'
      - '*.md'
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-projects:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install ai @ai-sdk/anthropic tsx --legacy-peer-deps

    - name: Run GitHub Projects Agent (Haiku)
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # PAT with 'repo' scope to include private repos.
        # Create at: https://github.com/settings/tokens/new?scopes=repo
        # Save as GHPAT_REPO_READ in repo secrets.
        GITHUB_TOKEN: ${{ secrets.GHPAT_REPO_READ }}
        GITHUB_USERNAME: thecuriousnobody
      run: npx tsx scripts/fetch-github-projects.ts

    - name: Check for changes
      id: git-check
      run: |
        git diff --exit-code public/data/github-projects.json || echo "changes=true" >> $GITHUB_OUTPUT

    - name: Commit and push if changed
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/github-projects.json
        git commit -m "Update GitHub projects with AI descriptions

        Automated sync via GitHub Actions

        Co-Authored-By: GitHub Actions <noreply@github.com>"
        git push
