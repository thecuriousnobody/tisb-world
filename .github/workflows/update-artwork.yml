name: Update Artwork from Behance

on:
  # Weekly: Sundays 13:00 UTC (~8am Central)
  schedule:
    - cron: '0 13 * * 0'
  # Manual trigger for right after publishing new work
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-artwork:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Sync artwork from Behance RSS
      run: node scripts/fetch-artwork.js

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/behance-portfolio.json
        git diff --staged --quiet || git commit -m "Update artwork from Behance RSS

        Automated sync via GitHub Actions

        Co-Authored-By: GitHub Actions <noreply@github.com>"
        git push
